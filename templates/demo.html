<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrameCheck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    main { max-width: 760px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.75rem; font-weight: 700; color: #1a1a2e; }
    header p  { margin-top: .35rem; color: #5a6478; font-size: .95rem; }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: .85rem 1rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      resize: vertical;
      background: #fff;
      color: #1a1a2e;
      transition: border-color .15s;
    }
    textarea:focus { outline: none; border-color: #4f6ef7; }

    button {
      margin-top: .75rem;
      padding: .65rem 1.5rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    button:hover  { background: #3a57e8; }
    button:disabled { opacity: .55; cursor: not-allowed; }

    #error {
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 7px;
      color: #b91c1c;
      font-size: .9rem;
    }

    #results { margin-top: 1.75rem; display: none; flex-direction: column; gap: 1rem; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .card-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8491a8;
      margin-bottom: .85rem;
    }

    /* Sentiment */
    .sentiment-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: .03em;
    }
    .sentiment-label.positive { color: #059669; }
    .sentiment-label.negative { color: #dc2626; }

    .confidence-bar-wrap {
      margin-top: .6rem;
      background: #e5e7eb;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .confidence-bar {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .confidence-bar.positive { background: #059669; }
    .confidence-bar.negative { background: #dc2626; }
    .confidence-pct { margin-top: .35rem; font-size: .82rem; color: #5a6478; }

    /* Framing signals */
    .signal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem 1.5rem;
    }
    .signal-item label {
      display: block;
      font-size: .75rem;
      color: #8491a8;
      margin-bottom: .15rem;
    }
    .signal-item span {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .entity-table { width: 100%; border-collapse: collapse; margin-top: .75rem; font-size: .88rem; }
    .entity-table th {
      text-align: left;
      padding: .3rem .5rem;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #8491a8;
      border-bottom: 1px solid #e5e7eb;
    }
    .entity-table td { padding: .35rem .5rem; }
    .entity-table tr:not(:last-child) td { border-bottom: 1px solid #f3f4f6; }
    .entity-badge {
      display: inline-block;
      padding: .1rem .45rem;
      border-radius: 4px;
      background: #eff2ff;
      color: #4f6ef7;
      font-size: .75rem;
      font-weight: 600;
    }
    .no-entities { font-size: .88rem; color: #8491a8; font-style: italic; }

    /* Frame summary */
    .frame-label {
      font-size: 1.05rem;
      font-weight: 600;
      color: #4f6ef7;
      margin-bottom: .6rem;
    }
    .loaded-wrap { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .75rem; }
    .loaded-chip {
      padding: .2rem .6rem;
      background: #fef3c7;
      color: #92400e;
      border-radius: 5px;
      font-size: .83rem;
      font-weight: 500;
    }
    .rationale { font-size: .9rem; color: #5a6478; line-height: 1.55; }
    .frame-na { font-size: .9rem; color: #8491a8; font-style: italic; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <header>
    <h1>FrameCheck</h1>
    <p>Analyze news text for sentiment, linguistic framing signals, and potential bias.</p>
  </header>

  <textarea id="text" placeholder="Paste a news headline or article paragraph…"></textarea>
  <br>
  <button id="btn" onclick="analyze()">Analyze</button>

  <div id="error" hidden></div>

  <div id="results">
    <div class="two-col">
      <!-- Sentiment card -->
      <div class="card">
        <div class="card-title">Sentiment</div>
        <div class="sentiment-label" id="sent-label"></div>
        <div class="confidence-bar-wrap">
          <div class="confidence-bar" id="sent-bar"></div>
        </div>
        <div class="confidence-pct" id="sent-pct"></div>
      </div>

      <!-- Framing signals card -->
      <div class="card">
        <div class="card-title">Framing Signals</div>
        <div class="signal-grid">
          <div class="signal-item">
            <label>Modal verbs</label>
            <span id="modal-count">—</span>
          </div>
          <div class="signal-item">
            <label>Passive voice</label>
            <span id="passive-ratio">—</span>
          </div>
          <div class="signal-item">
            <label>Sentences</label>
            <span id="sent-count">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Entities card -->
    <div class="card">
      <div class="card-title">Named Entities</div>
      <div id="entity-body"></div>
    </div>

    <!-- Frame summary card -->
    <div class="card">
      <div class="card-title">LLM Frame Summary</div>
      <div id="frame-body"></div>
    </div>
  </div>
</main>

<script>
  async function analyze() {
    const text = document.getElementById("text").value.trim();
    const btn  = document.getElementById("btn");
    const errEl = document.getElementById("error");

    errEl.hidden = true;
    if (!text) { showError("Please enter some text."); return; }

    btn.disabled = true;
    btn.textContent = "Analyzing…";

    try {
      const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) {
        const detail = await res.json().catch(() => ({}));
        throw new Error(detail.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      render(data);
    } catch (e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Analyze";
    }
  }

  function render(d) {
    // Sentiment
    const label = d.sentiment.label;
    const score = d.sentiment.score;
    const cls   = label === "POSITIVE" ? "positive" : "negative";
    const el    = document.getElementById("sent-label");
    el.textContent = label;
    el.className   = "sentiment-label " + cls;
    const bar = document.getElementById("sent-bar");
    bar.className = "confidence-bar " + cls;
    bar.style.width = (score * 100).toFixed(1) + "%";
    document.getElementById("sent-pct").textContent =
      (score * 100).toFixed(1) + "% confidence";

    // Framing signals
    document.getElementById("modal-count").textContent  = d.framing.modal_count;
    document.getElementById("passive-ratio").textContent =
      (d.framing.passive_ratio * 100).toFixed(0) + "%";
    document.getElementById("sent-count").textContent   = d.framing.sentence_count;

    // Entities
    const entityBody = document.getElementById("entity-body");
    const counts = d.framing.entity_counts;
    const types  = Object.keys(counts);
    if (types.length === 0) {
      entityBody.innerHTML = '<span class="no-entities">No named entities detected.</span>';
    } else {
      const rows = types.map(t =>
        `<tr><td><span class="entity-badge">${t}</span></td><td>${counts[t]}</td></tr>`
      ).join("");
      entityBody.innerHTML =
        `<table class="entity-table"><thead><tr><th>Type</th><th>Count</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    // Frame summary
    const frameBody = document.getElementById("frame-body");
    if (d.frame_summary) {
      const chips = d.frame_summary.loaded_language.map(w =>
        `<span class="loaded-chip">${w}</span>`
      ).join("");
      frameBody.innerHTML =
        `<div class="frame-label">${d.frame_summary.frame}</div>` +
        `<div class="loaded-wrap">${chips || "<span class='no-entities'>none flagged</span>"}</div>` +
        `<div class="rationale">${d.frame_summary.rationale}</div>`;
    } else {
      frameBody.innerHTML =
        '<span class="frame-na">LLM backend not active — set LLM_BACKEND=ollama or LLM_BACKEND=anthropic.</span>';
    }

    document.getElementById("results").style.display = "flex";
  }

  function showError(msg) {
    const el = document.getElementById("error");
    el.textContent = "Error: " + msg;
    el.hidden = false;
  }

  // Submit on Ctrl+Enter
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") analyze();
  });
</script>
</body>
</html>
