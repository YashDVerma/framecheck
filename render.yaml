services:
  - type: web
    name: framecheck
    runtime: python
    plan: free

    # No torch on Render — VADER (NLTK) handles sentiment with ~2MB vs ~260MB for DistilBERT.
    # en_core_web_sm is installed directly via pip URL in requirements-render.txt.
    buildCommand: >
      pip install -r requirements-render.txt &&
      python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LLM_BACKEND
        value: none
