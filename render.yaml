services:
  - type: web
    name: framecheck
    runtime: python
    plan: free

    # CPU-only torch is ~200MB vs ~2GB for CUDA — essential for Render's 512MB free tier.
    # Install it first so transformers reuses it rather than pulling CUDA torch as a dep.
    buildCommand: >
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements-render.txt &&
      python -m spacy download en_core_web_sm &&
      python -c "from transformers import pipeline; pipeline('sentiment-analysis', model='distilbert-base-uncased-finetuned-sst-2-english', truncation=True)"

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LLM_BACKEND
        value: none
